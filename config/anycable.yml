default: &default
  access_logs_disabled: false
  broadcast_adapter: http
  secret: "anycable-local-secret"
  websocket_url: "ws://localhost:8080/cable"
  redis_url: "redis://localhost:6379/1"

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
  websocket_url: ~
  secret: ~
  broadcast_adapter: redisx

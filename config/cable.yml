<% require Rails.root.join("lib/redis_ssl_config") %>
<% redis_ssl_params = RedisSslConfig.params_for(ENV.fetch("REDIS_URL", "redis://localhost:6379/1")) %>

development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/1") %>
  channel_prefix: globe_tracker_development

test:
  adapter: test

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL", "redis://localhost:6379/1") %>
  channel_prefix: globe_tracker_production
  <% if redis_ssl_params.present? %>
  ssl_params:
    verify_mode: <%= redis_ssl_params[:verify_mode] %>
    <% if redis_ssl_params[:ca_file].present? %>
    ca_file: <%= redis_ssl_params[:ca_file].inspect %>
    <% end %>
  <% end %>
